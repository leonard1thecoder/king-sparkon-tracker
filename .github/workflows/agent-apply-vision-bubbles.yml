# trigger after workflow registration
name: Agent Apply Vision Bubbles

on:
  push:
    branches:
      - "agent/production-readiness-phase2"
    paths:
      - ".github/workflows/agent-apply-vision-bubbles.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-readiness-phase2
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Connect slow bouncing vision circles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/components/marketing/KingSparkonLanding.tsx")
          source = path.read_text()

          import_anchor = 'import { SubscriptionSection } from "@/components/marketing/SubscriptionSection";\n'
          bubble_import = 'import { VisionBubbleField } from "@/components/marketing/VisionBubbleField";\n'
          if bubble_import not in source:
              source = source.replace(import_anchor, import_anchor + bubble_import)

          old = '          <div className="mt-10 grid gap-5 md:grid-cols-3">{visionPillars.map(({ icon: Icon, title, copy }) => <article key={title} className="rounded-xl border border-[var(--line)] bg-white p-6"><div className="grid h-11 w-11 place-items-center rounded-lg border border-[var(--line)] text-[var(--signal)]"><Icon className="h-5 w-5" /></div><h3 className="mt-5 text-xl font-black tracking-[-0.03em]">{title}</h3><p className="mt-3 text-sm leading-7 text-[var(--steel)]">{copy}</p></article>)}</div>'
          new = '          <VisionBubbleField items={visionPillars} />'
          if old not in source and new not in source:
              raise SystemExit("Vision card block was not found")
          source = source.replace(old, new)
          path.write_text(source)
          PY
          rm -f .github/workflows/agent-apply-vision-bubbles.yml
          git diff --check
      - name: Validate frontend
        run: |
          bun install
          bun run typecheck
          bun run lint
          bun run test
          bun run build
      - name: Commit vision bubbles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/workflows
          git commit -m "Animate bouncing vision circles"
          git push origin HEAD:agent/production-readiness-phase2
