name: Agent Apply White UI V2

on:
  push:
    branches:
      - "agent/production-readiness-phase2"
    paths:
      - ".agent/ui2.hex09"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-readiness-phase2
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Rebuild and apply reviewed UI source package
        run: |
          python - <<'PY'
          from pathlib import Path
          chunks = sorted(Path('.agent').glob('ui2.hex*'))
          payload = ''.join(path.read_text().strip() for path in chunks)
          Path('/tmp/ui-overhaul-v2.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          tar -xzf /tmp/ui-overhaul-v2.tar.gz
          rm -f .agent/ui2.hex* .agent/ui-overhaul.hex* .agent/ui-overhaul.part* .agent/ui-overhaul.tar.gz.b64
          rm -f .github/workflows/agent-apply-white-ui.yml .github/workflows/agent-apply-white-ui-parts.yml .github/workflows/agent-apply-white-ui-hex.yml .github/workflows/agent-apply-white-ui-v2.yml
          git diff --check
      - name: Validate frontend
        run: |
          bun install
          bun run typecheck
          bun run lint
      - name: Commit white UI overhaul
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .agent .github/workflows
          git commit -m "Replace legacy theme with focused white UI"
          git push origin HEAD:agent/production-readiness-phase2
