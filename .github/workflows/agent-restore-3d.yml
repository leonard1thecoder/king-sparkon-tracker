name: Agent Restore Purposeful 3D Motion

on:
  push:
    branches:
      - "agent/production-readiness-phase2"
    paths:
      - ".agent/restore3d.hex01"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-readiness-phase2
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Restore reviewed 3D motion package
        run: |
          python - <<'PY'
          from pathlib import Path
          payload = Path('.agent/restore3d.hex01').read_text().strip()
          Path('/tmp/restore-3d.tar.gz').write_bytes(bytes.fromhex(payload))
          PY
          tar -xzf /tmp/restore-3d.tar.gz
          rm -f .agent/restore3d.hex01 .github/workflows/agent-restore-3d.yml
          git diff --check
      - name: Validate frontend
        run: |
          bun install
          bun run lint
          bun run typecheck
          bun run test
          bun run build
      - name: Commit purposeful 3D motion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .agent .github/workflows/agent-restore-3d.yml
          git commit -m "Restore purposeful 3D motion across the landing page"
          git push origin HEAD:agent/production-readiness-phase2
