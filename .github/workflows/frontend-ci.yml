name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

env:
  BUN_DOCKER_IMAGE: oven/bun:1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies in Bun Docker image
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CI=true \
            -e HOME=/tmp \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            "${BUN_DOCKER_IMAGE}" \
            sh -lc '
              set -eu

              restore_lock() {
                if [ -f /tmp/king-sparkon-bun.lock ]; then
                  mv -f /tmp/king-sparkon-bun.lock bun.lock
                fi
              }
              trap restore_lock EXIT

              if ! bun install --frozen-lockfile; then
                echo "::warning::bun.lock is out of sync with package.json. Falling back to bun install --no-save for CI validation. Regenerate and commit bun.lock later."
                if [ -f bun.lock ]; then
                  mv bun.lock /tmp/king-sparkon-bun.lock
                fi
                bun install --no-save
              fi
            '

      - name: Lint in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run lint'

      - name: Typecheck in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run typecheck'

      - name: Test in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run test'

      - name: Build in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run build'
