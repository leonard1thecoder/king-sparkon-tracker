name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

env:
  BUN_DOCKER_IMAGE: oven/bun:1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install dependencies in Bun Docker image
        run: |
          set +e
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CI=true \
            -e HOME=/tmp \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            "${BUN_DOCKER_IMAGE}" \
            sh -lc '
              set -eu

              restore_lock() {
                if [ -f /tmp/king-sparkon-bun.lock ]; then
                  mv -f /tmp/king-sparkon-bun.lock bun.lock
                fi
              }
              trap restore_lock EXIT

              if ! bun install --frozen-lockfile; then
                echo "::warning::bun.lock is out of sync with package.json. Falling back to bun install --no-save for CI validation. Regenerate and commit bun.lock later."
                if [ -f bun.lock ]; then
                  mv bun.lock /tmp/king-sparkon-bun.lock
                fi
                bun install --no-save
              fi
            ' > install.log 2>&1
          status=$?
          tail -n 120 install.log
          exit $status

      - name: Lint in Bun Docker image
        run: |
          set +e
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run lint' > lint.log 2>&1
          status=$?
          tail -n 120 lint.log
          exit $status

      - name: Typecheck in Bun Docker image
        run: |
          set +e
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run typecheck' > typecheck.log 2>&1
          status=$?
          tail -n 200 typecheck.log
          exit $status

      - name: Test in Bun Docker image
        run: |
          set +e
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run test' > test.log 2>&1
          status=$?
          tail -n 120 test.log
          exit $status

      - name: Build in Bun Docker image
        run: |
          set +e
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run build' > build.log 2>&1
          status=$?
          tail -n 120 build.log
          exit $status

      - name: Upload frontend CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-validation-logs
          path: "*.log"
