name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: |
          set +e
          bun run typecheck > build.log 2>&1
          status=$?
          tail -n 200 build.log
          exit $status

      - name: Test
        run: bun run test

      - name: Build
        run: |
          set +e
          bun run build > build.log 2>&1
          status=$?
          tail -n 200 build.log
          exit $status

      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: build.log
