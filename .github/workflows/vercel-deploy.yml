name: Vercel Deploy

on:
  pull_request:
  push:
    branches: [main]

env:
  BUN_DOCKER_IMAGE: oven/bun:1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies in Bun Docker image
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CI=true \
            -e HOME=/tmp \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            "${BUN_DOCKER_IMAGE}" \
            sh -lc '
              set -eu

              restore_lock() {
                if [ -f /tmp/king-sparkon-bun.lock ]; then
                  mv -f /tmp/king-sparkon-bun.lock bun.lock
                fi
              }
              trap restore_lock EXIT

              if ! bun install --frozen-lockfile; then
                echo "::warning::bun.lock is out of sync with package.json. Falling back to bun install --no-save for CI validation. Regenerate and commit bun.lock later."
                if [ -f bun.lock ]; then
                  mv bun.lock /tmp/king-sparkon-bun.lock
                fi
                bun install --no-save
              fi
            '

      - name: Lint in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run lint'

      - name: Typecheck in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run typecheck'

      - name: Test in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run test'

      - name: Build in Bun Docker image
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -e CI=true -e HOME=/tmp -v "${GITHUB_WORKSPACE}:/app" -w /app "${BUN_DOCKER_IMAGE}" sh -lc 'bun run build'

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::warning::Skipping Vercel preview deploy because Vercel secrets are not configured."
            exit 0
          fi

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CI=true \
            -e HOME=/tmp \
            -e VERCEL_TOKEN \
            -e VERCEL_ORG_ID \
            -e VERCEL_PROJECT_ID \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            "${BUN_DOCKER_IMAGE}" \
            sh -lc 'bunx vercel deploy --token "$VERCEL_TOKEN" --yes --archive=tgz'

      - name: Deploy production
        if: github.event_name == 'push'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Vercel production deploy requires VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID secrets."
            exit 1
          fi

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CI=true \
            -e HOME=/tmp \
            -e VERCEL_TOKEN \
            -e VERCEL_ORG_ID \
            -e VERCEL_PROJECT_ID \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            "${BUN_DOCKER_IMAGE}" \
            sh -lc 'bunx vercel deploy --prod --token "$VERCEL_TOKEN" --yes --archive=tgz'
